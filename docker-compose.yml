services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    ports:
    - "8000:8000"
    volumes:
      - ./models:/app/models
  
  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.frontend
    ports:
    - "8501:8501"
    environment:
      - API_URL=http://backend:8000